name: lightner
description: "A premium offline Leitner-system flashcard app for learning English vocabulary."
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  flutter_launcher_icons: ^0.14.4

  # Routing
  go_router: ^14.2.0

  # Text to speech (offline, uses on-device engine)
  flutter_tts: ^4.0.2

  timezone: ^0.11.1

  flutter_local_notifications: ^22.1.0

  # Charts for statistics dashboard
  fl_chart: ^0.68.0

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  share_plus: ^9.0.0
  file_picker: ^8.0.6

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
